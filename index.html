<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idhayam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7f7f7;
}

header{
background:linear-gradient(135deg,#0f9d58,#34a853);
color:white;
padding:20px;
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:700;
}

.cart-btn{
background:white;
color:#0f9d58;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.hero{
height:500px;
background:url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=1600') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero-content{
background:rgba(0,0,0,0.55);
padding:40px;
border-radius:20px;
}

.hero h1{
font-size:55px;
}

.hero p{
margin-top:10px;
font-size:18px;
}

.search-section{
padding:30px;
text-align:center;
}

.search-box{
width:90%;
max-width:500px;
padding:15px;
border:none;
border-radius:50px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
font-size:16px;
}

.products{
padding:50px 5%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    font-size:20px;
    color:#0f9d58;
    font-weight:bold;
    margin:10px 0;
}

.card button{
    width:100%;
    background:#0f9d58;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.cart{
position:fixed;
right:20px;
bottom:20px;
background:white;
padding:20px;
width:300px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.cart h3{
margin-bottom:10px;
}

footer{
background:#222;
color:white;
padding:40px;
text-align:center;
margin-top:50px;
}

.whatsapp{
background:#25D366;
margin-top:15px;
display:inline-block;
padding:12px 25px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
}

@media(max-width:768px){
.hero h1{
font-size:36px;
}
.cart{
width:90%;
right:5%;
}
}
</style>
</head>

let cart=[];
let total=0;

const container=document.getElementById("products");

function displayProducts(productList) {

const container = document.getElementById("products");
container.innerHTML = "";

productList.forEach(product => {

  container.innerHTML += `
<div class="card">
  <img src="${product.img}" alt="${product.name}">
  <div class="card-content">
      <h3>${product.name}</h3>
      <p>${product.tamil}</p>
      <small>${product.category}</small>
      <div class="price">₹${product.price}</div>
      <button onclick="addToCart('${product.name}',${product.price})">
          Add to Cart
      </button>
  </div>
</div>
`;
});

}

displayProducts(products);

function addToCart(name,price){
cart.push({name,price});
total+=price;

document.getElementById("total").innerText=total;
document.getElementById("cartTotal").innerText=total;

renderCart();
}

function renderCart() {

let message = "வணக்கம் இதயம் ஸ்டோர்,%0A%0A";
message += "நான் கீழே உள்ள பொருட்களை ஆர்டர் செய்ய விரும்புகிறேன்:%0A%0A";

cart.forEach(item => {
    message += `🛒 ${item.name} - ₹${item.price}%0A`;
});

message += `%0A💰 மொத்த தொகை: ₹${total}%0A`;
message += `%0A📍 தயவுசெய்து என் ஆர்டரை உறுதிப்படுத்தவும்.`;

document.getElementById("whatsappBtn").href =
`https://wa.me/919500385021?text=${message}`;
}
document.getElementById("search").addEventListener("keyup",(e)=>{

const value=e.target.value.toLowerCase();

const filtered=products.filter(product=>
product.name.toLowerCase().includes(value)
);

displayProducts(filtered);

});

</script>
